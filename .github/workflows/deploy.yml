name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Build & Type Check ─────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── 2. Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # SSH 키 세팅
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV

      # 소스코드 → 서버 배포 경로로 rsync (node_modules 제외)
      - name: Sync source to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/winterholic/projects/services/home-server-admin/frontend/"

      # 서버에서 docker-compose로 빌드 & 재시작
      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /home/winterholic/projects/services/home-server-admin/frontend
            docker compose up -d --build --remove-orphans
            echo "✓ Frontend deployed on port 5005!"
